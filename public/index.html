<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Transcript Viewer</title>
<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
/* Dark theme (default) */
:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-surface2: #1c2129;
  --bg-user: #0c2d48;
  --bg-thinking: #1a1328;
  --bg-tool: #121820;
  --bg-tool-result: #0a0f16;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-dimmer: #6e7681;
  --border: #30363d;
  --accent: #58a6ff;
  --accent-green: #3fb950;
  --accent-purple: #bc8cff;
  --accent-orange: #d29922;
  --accent-red: #f85149;
  --radius: 8px;
  --bg-user-role: #0c3d6a;
  --bg-assistant-role: #1a2c1a;
  --bg-thinking-border: #2d1f47;
  --bg-subagent: #0c2d48;
  --bg-subagent-hover: #0e3a5e;
  --bg-active-banner: #0f2a1a;
  --bg-inline-code: #282e37;
  --bg-modal-overlay: rgba(0,0,0,0.7);
  --badge-text: #000;
  --tool-bg-bash: #1a2b1a;
  --tool-bg-rw: #2a2510;
  --tool-bg-search: #1a1a2e;
  --tool-bg-task: #0c2d48;
  --tool-bg-other: #1a1a1a;
  color-scheme: dark;
}

/* Light theme variables */
[data-theme="light"] {
  --bg: #ffffff;
  --bg-surface: #f6f8fa;
  --bg-surface2: #eaeef2;
  --bg-user: #ddf4ff;
  --bg-thinking: #f5f0ff;
  --bg-tool: #f6f8fa;
  --bg-tool-result: #f0f3f6;
  --text: #1f2328;
  --text-dim: #656d76;
  --text-dimmer: #8b949e;
  --border: #d0d7de;
  --accent: #0969da;
  --accent-green: #1a7f37;
  --accent-purple: #8250df;
  --accent-orange: #9a6700;
  --accent-red: #cf222e;
  --bg-user-role: #b6e3ff;
  --bg-assistant-role: #aff5b4;
  --bg-thinking-border: #d8b4fe;
  --bg-subagent: #ddf4ff;
  --bg-subagent-hover: #b6e3ff;
  --bg-active-banner: #dcffe4;
  --bg-inline-code: #eef1f6;
  --bg-modal-overlay: rgba(0,0,0,0.4);
  --badge-text: #fff;
  --tool-bg-bash: #dcffe4;
  --tool-bg-rw: #fff8c5;
  --tool-bg-search: #f5f0ff;
  --tool-bg-task: #ddf4ff;
  --tool-bg-other: #f6f8fa;
  color-scheme: light;
}

/* System theme — follow OS preference */
@media (prefers-color-scheme: light) {
  [data-theme="system"] {
    --bg: #ffffff;
    --bg-surface: #f6f8fa;
    --bg-surface2: #eaeef2;
    --bg-user: #ddf4ff;
    --bg-thinking: #f5f0ff;
    --bg-tool: #f6f8fa;
    --bg-tool-result: #f0f3f6;
    --text: #1f2328;
    --text-dim: #656d76;
    --text-dimmer: #8b949e;
    --border: #d0d7de;
    --accent: #0969da;
    --accent-green: #1a7f37;
    --accent-purple: #8250df;
    --accent-orange: #9a6700;
    --accent-red: #cf222e;
    --bg-user-role: #b6e3ff;
    --bg-assistant-role: #aff5b4;
    --bg-thinking-border: #d8b4fe;
    --bg-subagent: #ddf4ff;
    --bg-subagent-hover: #b6e3ff;
    --bg-active-banner: #dcffe4;
    --bg-inline-code: #eef1f6;
    --bg-modal-overlay: rgba(0,0,0,0.4);
    --badge-text: #fff;
    --tool-bg-bash: #dcffe4;
    --tool-bg-rw: #fff8c5;
    --tool-bg-search: #f5f0ff;
    --tool-bg-task: #ddf4ff;
    --tool-bg-other: #f6f8fa;
    color-scheme: light;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1000px; margin: 0 auto; padding: 16px 20px; }

/* Header */
.header {
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  background: var(--bg-surface);
  position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
.breadcrumb { font-size: 13px; color: var(--text-dim); }
.breadcrumb a { color: var(--text-dim); }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb span { margin: 0 6px; }

/* Search */
.search-bar {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  margin-bottom: 16px;
}
.search-bar:focus { outline: none; border-color: var(--accent); }

/* Project cards */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.project-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.project-card:hover { border-color: var(--accent); }
.project-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
.project-card .meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 12px; }

/* Session table */
.session-list { display: flex; flex-direction: column; gap: 4px; }
.session-row {
  display: grid;
  grid-template-columns: 1fr 160px 80px 60px;
  gap: 12px;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
  font-size: 13px;
}
.session-row:hover { border-color: var(--accent); }
.session-row .slug { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-row .date { color: var(--text-dim); font-size: 12px; }
.session-row .size { color: var(--text-dimmer); font-size: 12px; text-align: right; }
.session-row .badge {
  background: var(--accent);
  color: var(--badge-text);
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  text-align: center;
}
.session-row .badge.empty { background: transparent; }

/* Transcript */
.transcript { display: flex; flex-direction: column; gap: 4px; padding-bottom: 60px; }

.msg {
  border-radius: var(--radius);
  padding: 12px 16px;
}

.msg.user-msg {
  background: var(--bg-user);
  border-left: 3px solid var(--accent);
}

.msg.assistant-msg {
  background: var(--bg-surface);
}

.msg-header {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.msg-header .role {
  font-weight: 600;
  text-transform: uppercase;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
}
.msg-header .role.user { background: var(--bg-user-role); color: var(--accent); }
.msg-header .role.assistant { background: var(--bg-assistant-role); color: var(--accent-green); }

/* Thinking */
.thinking-block {
  margin: 6px 0;
  border-radius: 6px;
  background: var(--bg-thinking);
  border: 1px solid var(--bg-thinking-border);
}
.thinking-block summary {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
  color: var(--accent-purple);
  user-select: none;
}
.thinking-block .thinking-content {
  padding: 8px 12px;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-dim);
  max-height: 400px;
  overflow-y: auto;
  border-top: 1px solid var(--bg-thinking-border);
}

/* Tool use */
.tool-block {
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-tool);
  overflow: hidden;
}
.tool-header {
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  cursor: pointer;
  user-select: none;
}
.tool-icon { font-size: 14px; }
.tool-name {
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
}
.tool-name.bash { background: var(--tool-bg-bash); color: var(--accent-green); }
.tool-name.read, .tool-name.write, .tool-name.edit { background: var(--tool-bg-rw); color: var(--accent-orange); }
.tool-name.grep, .tool-name.glob { background: var(--tool-bg-search); color: var(--accent-purple); }
.tool-name.task, .tool-name.skill { background: var(--tool-bg-task); color: var(--accent); }
.tool-name.other { background: var(--tool-bg-other); color: var(--text-dim); }
.tool-desc { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.tool-chevron {
  color: var(--text-dimmer);
  font-size: 10px;
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.tool-chevron.expanded { transform: rotate(90deg); }
.tool-input {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
  max-height: 300px;
  overflow-y: auto;
}

/* Tool result */
.tool-result {
  border-top: 1px solid var(--border);
  background: var(--bg-tool-result);
  padding: 8px 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
  max-height: 300px;
  overflow-y: auto;
}
.tool-result.error { color: var(--accent-red); }
.tool-result.collapsed { max-height: 120px; position: relative; }
.tool-result.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(transparent, var(--bg-tool-result));
}
.expand-btn {
  display: block;
  width: 100%;
  padding: 4px;
  background: var(--bg-surface2);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--accent);
  font-size: 11px;
  cursor: pointer;
}

/* Subagent link */
.subagent-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  margin-top: 4px;
  background: var(--bg-subagent);
  border: 1px solid var(--accent);
  border-radius: 4px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.subagent-link:hover { background: var(--bg-subagent-hover); text-decoration: none; }

/* View JSON button */
.view-json-btn {
  margin-left: auto;
  padding: 1px 8px;
  background: var(--bg-surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dimmer);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.view-json-btn:hover { color: var(--accent); border-color: var(--accent); }

/* JSON Modal */
.json-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-modal-overlay);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.json-modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 900px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}
.json-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 13px;
}
.json-modal-header button {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
}
.json-modal-header button:hover { color: var(--text); }
.json-modal-body {
  padding: 12px 16px;
  overflow-y: auto;
  flex: 1;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text-dim);
  line-height: 1.5;
}
.json-modal-actions {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
}
.json-modal-actions button {
  padding: 4px 12px;
  background: var(--bg-surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  font-size: 12px;
  cursor: pointer;
}
.json-modal-actions button:hover { border-color: var(--accent); }

/* Subagent banner */
.subagent-banner {
  background: var(--bg-subagent);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 10px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
}

/* Markdown content */
.md-content { line-height: 1.65; }
.md-content p { margin: 4px 0; }
.md-content pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  overflow-x: auto;
  margin: 6px 0;
}
.md-content code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
}
.md-content :not(pre) > code {
  background: var(--bg-inline-code);
  padding: 1px 5px;
  border-radius: 4px;
}
.md-content h1, .md-content h2, .md-content h3 { margin: 8px 0 4px; }
.md-content ul, .md-content ol { padding-left: 20px; margin: 4px 0; }
.md-content table { border-collapse: collapse; margin: 6px 0; }
.md-content th, .md-content td { border: 1px solid var(--border); padding: 4px 8px; font-size: 13px; }

/* Active indicator */
.badge.active {
  background: var(--accent-green);
  color: var(--badge-text);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.active-banner {
  background: var(--bg-active-banner);
  border: 1px solid var(--accent-green);
  border-radius: var(--radius);
  padding: 10px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--accent-green);
}
.active-banner .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 2s ease-in-out infinite;
}

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text-dim); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Session meta */
.session-meta {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-wrap: wrap;
  gap: 6px 16px;
}
.session-meta span { white-space: nowrap; }
.session-meta strong { color: var(--text); }

/* File path row */
.file-path-row {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.file-path-row code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text);
  word-break: break-all;
  flex: 1;
}
.copy-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  padding: 3px 8px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--accent-green); color: var(--accent-green); }

/* Theme toggle */
.theme-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  flex-shrink: 0;
}
.theme-toggle button {
  background: none;
  border: none;
  color: var(--text-dimmer);
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.theme-toggle button:hover {
  color: var(--text-dim);
}
.theme-toggle button.active {
  background: var(--bg-surface2);
  color: var(--text);
}
.theme-toggle .theme-label {
  font-size: 11px;
  font-weight: 500;
}
@media (max-width: 600px) {
  .theme-toggle .theme-label { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><a href="#/" style="color: var(--text);">Claude Transcripts</a></h1>
    <div id="breadcrumb" class="breadcrumb"></div>
    <div class="theme-toggle" id="themeToggle">
      <button data-theme="system" title="System theme" onclick="setTheme('system')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        <span class="theme-label">System</span>
      </button>
      <button data-theme="light" title="Light theme" onclick="setTheme('light')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <span class="theme-label">Light</span>
      </button>
      <button data-theme="dark" title="Dark theme" onclick="setTheme('dark')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <span class="theme-label">Dark</span>
      </button>
    </div>
  </div>
</div>

<div class="container">
  <div id="app">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
// ---- Theme Management ----
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'system';
  document.documentElement.setAttribute('data-theme', saved);
  updateHljsTheme(getEffectiveTheme(saved));
  // Mark the active button as soon as DOM is ready
  requestAnimationFrame(() => updateThemeButtons(saved));
})();

function getEffectiveTheme(theme) {
  if (theme === 'system') {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  return theme;
}

function updateHljsTheme(effectiveTheme) {
  const link = document.getElementById('hljs-theme');
  if (!link) return;
  const isDark = effectiveTheme === 'dark';
  const newHref = isDark
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  if (link.href !== newHref) link.href = newHref;
}

function updateThemeButtons(theme) {
  const toggle = document.getElementById('themeToggle');
  if (!toggle) return;
  toggle.querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
  });
}

window.setTheme = function(theme) {
  localStorage.setItem('theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  updateHljsTheme(getEffectiveTheme(theme));
  updateThemeButtons(theme);
  // Re-highlight all code blocks with the new theme
  document.querySelectorAll('.md-content pre code').forEach(el => {
    try { hljs.highlightElement(el); } catch {}
  });
};

// Listen for OS theme changes (only matters when theme is "system")
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  const current = localStorage.getItem('theme') || 'system';
  if (current === 'system') {
    updateHljsTheme(getEffectiveTheme('system'));
    // Re-highlight code blocks
    document.querySelectorAll('.md-content pre code').forEach(el => {
      try { hljs.highlightElement(el); } catch {}
    });
  }
});
// ---- End Theme Management ----

const $ = document.getElementById.bind(document);
const app = $('app');
const breadcrumb = $('breadcrumb');

// Configure marked
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch {}
    }
    try { return hljs.highlightAuto(code).value; } catch {}
    return code;
  },
  breaks: false,
  gfm: true,
});

// Router
window.addEventListener('hashchange', route);
window.addEventListener('load', route);

function route() {
  const hash = location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);

  if (parts[0] === 'project' && parts[1]) {
    renderSessionList(parts[1]);
  } else if (parts[0] === 'session' && parts[1] && parts[2]) {
    renderTranscript(parts[1], parts[2]);
  } else if (parts[0] === 'subagent' && parts[1] && parts[2] && parts[3]) {
    renderSubagent(parts[1], parts[2], parts[3]);
  } else {
    renderProjectList();
  }
}

// API helpers
async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// Views
async function renderProjectList() {
  stopActivePolling();
  breadcrumb.innerHTML = '';
  app.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  let projects;
  try {
    projects = await api('/api/projects');
  } catch (e) {
    app.innerHTML = `<div class="loading">Error loading projects: ${esc(e.message)}</div>`;
    return;
  }
  for (const p of projects) _projectNames[p.dir] = p.name;
  let html = '<input class="search-bar" placeholder="Search projects..." id="projectSearch">';
  html += '<div class="project-grid" id="projectGrid">';
  for (const p of projects) {
    const date = new Date(p.lastModified).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    html += `
      <div class="project-card" onclick="location.hash='#/project/${encodeURIComponent(p.dir)}'">
        <h3>${esc(p.name)}</h3>
        <div class="meta">
          <span>${p.sessionCount} sessions</span>
          <span>${date}</span>
        </div>
      </div>`;
  }
  html += '</div>';
  app.innerHTML = html;

  $('projectSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.project-card').forEach(card => {
      card.style.display = card.querySelector('h3').textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
}

async function renderSessionList(projectDir) {
  stopActivePolling();
  const decoded = decodeURIComponent(projectDir);
  const name = humanName(decoded);
  breadcrumb.innerHTML = `<a href="#/">Projects</a><span>/</span>${esc(name)}`;
  app.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  let sessions;
  try {
    sessions = await api(`/api/sessions/${encodeURIComponent(decoded)}`);
  } catch (e) {
    app.innerHTML = `<div class="loading">Error loading sessions: ${esc(e.message)}</div>`;
    return;
  }
  let html = '<input class="search-bar" placeholder="Search sessions..." id="sessionSearch">';
  html += '<div class="session-list" id="sessionGrid">';
  for (const s of sessions) {
    const date = new Date(s.timestamp).toLocaleString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const size = (s.fileSize / 1024).toFixed(0) + ' KB';
    const activeBadge = s.isActive ? '<span class="badge active">● Active</span>' : '';
    const badge = s.subagentCount > 0 ? `<span class="badge">${s.subagentCount} agents</span>` : '<span class="badge empty"></span>';
    html += `
      <div class="session-row" onclick="location.hash='#/session/${encodeURIComponent(decoded)}/${s.sessionId}'">
        <span class="slug">${esc(s.slug || s.sessionId.slice(0, 8))} ${activeBadge}</span>
        <span class="date">${date}</span>
        <span class="size">${size}</span>
        ${badge}
      </div>`;
  }
  html += '</div>';
  app.innerHTML = html;

  $('sessionSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.session-row').forEach(row => {
      row.style.display = row.querySelector('.slug').textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
}

let _activePollingInterval = null;

function stopActivePolling() {
  if (_activePollingInterval) {
    clearInterval(_activePollingInterval);
    _activePollingInterval = null;
  }
  cleanupScrollTracking();
}

async function renderTranscript(projectDir, sessionId) {
  stopActivePolling();
  cleanupScrollTracking();
  const decoded = decodeURIComponent(projectDir);
  const name = humanName(decoded);
  breadcrumb.innerHTML = `<a href="#/">Projects</a><span>/</span><a href="#/project/${encodeURIComponent(decoded)}">${esc(name)}</a><span>/</span>Session`;
  app.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const data = await api(`/api/transcript/${encodeURIComponent(decoded)}/${sessionId}`);
    renderTranscriptData(data, decoded, sessionId);

    // Check if active — if so, scroll to bottom immediately
    try {
      const { isActive } = await api(`/api/status/${encodeURIComponent(decoded)}/${sessionId}`);
      if (isActive) {
        scrollToBottom();
      }
    } catch {}

    // Start polling for active status
    startActivePolling(decoded, sessionId);
  } catch (e) {
    app.innerHTML = `<div class="loading">Error loading transcript: ${esc(e.message)}</div>`;
  }
}

async function renderSubagent(projectDir, sessionId, agentId) {
  stopActivePolling();
  const decoded = decodeURIComponent(projectDir);
  const name = humanName(decoded);
  breadcrumb.innerHTML = `<a href="#/">Projects</a><span>/</span><a href="#/project/${encodeURIComponent(decoded)}">${esc(name)}</a><span>/</span><a href="#/session/${encodeURIComponent(decoded)}/${sessionId}">Session</a><span>/</span>Agent ${esc(agentId.slice(0, 7))}`;
  app.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const data = await api(`/api/transcript/${encodeURIComponent(decoded)}/${sessionId}/subagent/${agentId}`);
    const banner = `<div class="subagent-banner">
      <span>Subagent transcript <strong>${esc(agentId.slice(0, 7))}</strong></span>
      <a href="#/session/${encodeURIComponent(decoded)}/${sessionId}">Back to parent session</a>
    </div>`;
    renderTranscriptData(data, decoded, sessionId, banner);
  } catch (e) {
    app.innerHTML = `<div class="loading">Error loading subagent transcript: ${esc(e.message)}</div>`;
  }
}

function renderTranscriptData(data, projectDir, sessionId, bannerHtml) {
  if (!data || !data.messages) {
    app.innerHTML = '<div class="loading">Transcript not found</div>';
    return;
  }

  // Build tool result map: tool_use_id -> {content, isError, agentId, agentLink}
  const toolResultMap = new Map();
  for (const msg of data.messages) {
    if (msg.toolResults) {
      for (const tr of msg.toolResults) {
        toolResultMap.set(tr.toolUseId, tr);
      }
    }
  }

  let html = '';
  html += '<div id="activeBanner"></div>';
  if (bannerHtml) html += bannerHtml;

  // Session meta
  const meta = [];
  if (data.slug) meta.push(`<span><strong>Session:</strong> ${esc(data.slug)}</span>`);
  if (data.cwd) meta.push(`<span><strong>CWD:</strong> ${esc(data.cwd)}</span>`);
  if (data.version) meta.push(`<span><strong>Version:</strong> ${esc(data.version)}</span>`);
  if (data.gitBranch) meta.push(`<span><strong>Branch:</strong> ${esc(data.gitBranch)}</span>`);
  if (meta.length) html += `<div class="session-meta">${meta.join('')}</div>`;

  if (data.filePath) {
    html += `<div class="file-path-row">
      <strong>File:</strong>
      <code>${esc(data.filePath)}</code>
      <button class="copy-btn" onclick="copyPath(this, '${esc(data.filePath).replace(/'/g, "\\'")}')">Copy</button>
    </div>`;
  }

  // Store raw JSON for View JSON buttons
  window._rawJsonMap = {};
  let _msgIdx = 0;

  html += '<div class="transcript">';

  for (const msg of data.messages) {
    // Skip user messages that are purely tool results (they're shown inline with assistant)
    if (msg.type === 'user' && !msg.text && msg.toolResults && msg.toolResults.length > 0) continue;
    // Skip sidechain messages in main transcript
    if (msg.isSidechain && !data.agentId) continue;

    const rawKey = 'raw_' + (_msgIdx++);
    if (msg._raw) {
      try { window._rawJsonMap[rawKey] = JSON.stringify(JSON.parse(msg._raw), null, 2); }
      catch { window._rawJsonMap[rawKey] = msg._raw; }
    }

    if (msg.type === 'user' && msg.text) {
      const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
      const jsonBtn = msg._raw ? `<button class="view-json-btn" onclick="showRawJson('${rawKey}')">{ } JSON</button>` : '';
      html += `<div class="msg user-msg">
        <div class="msg-header"><span class="role user">User</span><span>${time}</span>${jsonBtn}</div>
        <div class="md-content">${renderMarkdown(msg.text)}</div>
      </div>`;
    }

    if (msg.type === 'assistant' && msg.blocks) {
      const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
      const modelLabel = msg.model ? ` &middot; ${esc(msg.model)}` : '';
      const jsonBtn = msg._raw ? `<button class="view-json-btn" onclick="showRawJson('${rawKey}')">{ } JSON</button>` : '';
      html += `<div class="msg assistant-msg">
        <div class="msg-header"><span class="role assistant">Assistant</span><span>${time}${modelLabel}</span>${jsonBtn}</div>`;

      for (const block of msg.blocks) {
        if (block.type === 'thinking') {
          html += `<details class="thinking-block">
            <summary>Thinking...</summary>
            <div class="thinking-content">${esc(block.content || '')}</div>
          </details>`;
        } else if (block.type === 'text') {
          html += `<div class="md-content">${renderMarkdown(block.content)}</div>`;
        } else if (block.type === 'tool_use') {
          html += renderToolUse(block, toolResultMap, projectDir, sessionId);
        }
      }
      html += '</div>';
    }
  }

  html += '</div>';
  app.innerHTML = html;

  // Highlight code blocks
  document.querySelectorAll('.md-content pre code').forEach(el => {
    try { hljs.highlightElement(el); } catch {}
  });
}

function renderToolUse(block, toolResultMap, projectDir, sessionId) {
  const nameClass = getToolClass(block.name);
  const icon = getToolIcon(block.name);
  const desc = getToolDesc(block);
  const inputId = 'ti_' + (block.id || '').replace(/[^a-z0-9]/gi, '').slice(0, 12) + Math.random().toString(36).slice(2, 6);
  const resultId = 'tr_' + inputId;

  let html = `<div class="tool-block" id="tool-${esc(block.id || '')}">`;
  html += `<div class="tool-header" onclick="toggleEl('${inputId}')">
    <span class="tool-icon">${icon}</span>
    <span class="tool-name ${nameClass}">${esc(block.name)}</span>
    <span class="tool-desc">${esc(desc)}</span>
    <span class="tool-chevron" id="chev_${inputId}">&#9654;</span>
  </div>`;

  // Tool input (collapsed by default)
  const inputStr = formatToolInput(block);
  if (inputStr) {
    html += `<div class="tool-input" id="${inputId}" style="display:none">${esc(inputStr)}</div>`;
  }

  // Subagent link
  if (block.agentLink) {
    html += `<div style="padding:6px 10px;border-top:1px solid var(--border)">
      <a class="subagent-link" href="${block.agentLink}">View subagent transcript &rarr;</a>
    </div>`;
  }

  // Tool result
  const result = toolResultMap.get(block.id);
  if (result) {
    const lines = (result.content || '').split('\n');
    const isLong = lines.length > 30;
    const collapsed = isLong ? ' collapsed' : '';
    const errClass = result.isError ? ' error' : '';
    html += `<div class="tool-result${errClass}${collapsed}" id="${resultId}">${esc(result.content || '(empty)')}</div>`;
    if (isLong) {
      html += `<button class="expand-btn" onclick="expandResult('${resultId}', this)">Show all ${lines.length} lines</button>`;
    }
  }

  html += '</div>';
  return html;
}

function getToolClass(name) {
  const n = (name || '').toLowerCase();
  if (n === 'bash') return 'bash';
  if (n === 'read') return 'read';
  if (n === 'write') return 'write';
  if (n === 'edit') return 'edit';
  if (n === 'grep') return 'grep';
  if (n === 'glob') return 'glob';
  if (n === 'task') return 'task';
  if (n === 'skill') return 'skill';
  return 'other';
}

function getToolIcon(name) {
  const n = (name || '').toLowerCase();
  const icons = {
    bash: '\u25b6', read: '\ud83d\udcc4', write: '\u270f\ufe0f', edit: '\u270f\ufe0f',
    grep: '\ud83d\udd0d', glob: '\ud83d\udcc1', task: '\ud83d\udd00', skill: '\u26a1',
    askuserquestion: '\u2753', enterplanmode: '\ud83d\udccb', exitplanmode: '\u2705',
    webfetch: '\ud83c\udf10', websearch: '\ud83c\udf10',
  };
  return icons[n] || '\u2699\ufe0f';
}

function getToolDesc(block) {
  const input = block.input || {};
  const n = (block.name || '').toLowerCase();
  if (n === 'bash') return input.command || input.description || '';
  if (n === 'read') return input.file_path || '';
  if (n === 'write') return input.file_path || '';
  if (n === 'edit') return input.file_path || '';
  if (n === 'grep') return `${input.pattern || ''} ${input.path || ''}`.trim();
  if (n === 'glob') return input.pattern || '';
  if (n === 'task') return input.description || input.prompt?.slice(0, 80) || '';
  if (n === 'skill') return input.skill || '';
  return JSON.stringify(input).slice(0, 80);
}

function formatToolInput(block) {
  const input = block.input || {};
  const n = (block.name || '').toLowerCase();
  if (n === 'bash') return input.command || '';
  if (n === 'read') return input.file_path || '';
  if (n === 'write') return `File: ${input.file_path || ''}\n---\n${(input.content || '').slice(0, 2000)}`;
  if (n === 'edit') return `File: ${input.file_path || ''}\n\n--- old ---\n${input.old_string || ''}\n\n--- new ---\n${input.new_string || ''}`;
  if (n === 'task') return input.prompt || '';
  if (n === 'grep') return JSON.stringify(input, null, 2);
  return JSON.stringify(input, null, 2);
}

function renderMarkdown(text) {
  if (!text) return '';
  try { return marked.parse(text); } catch { return esc(text); }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// projectNames cache from API
const _projectNames = {};

function humanName(dirName) {
  if (_projectNames[dirName]) return _projectNames[dirName];
  // Fallback: strip everything up to and including the home dir portion
  // -Users-serg-v-project -> project
  const m = dirName.match(/^-Users-[^/]+-(.+)$/);
  if (m) return m[1];
  // Try: remove -Users-XX-XX- pattern (username with hyphens)
  const idx = dirName.indexOf('-', dirName.indexOf('-', dirName.indexOf('-') + 1) + 1);
  if (idx > 0 && idx < dirName.length - 1) return dirName.slice(idx + 1);
  return dirName;
}

// Global helpers for onclick
window.toggleEl = function(id) {
  const el = document.getElementById(id);
  if (el) {
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    const chev = document.getElementById('chev_' + id);
    if (chev) chev.classList.toggle('expanded', isHidden);
  }
};

window.copyPath = function(btn, path) {
  navigator.clipboard.writeText(path).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for non-HTTPS contexts
    const ta = document.createElement('textarea');
    ta.value = path;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
};

window.expandResult = function(id, btn) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.remove('collapsed');
    if (btn) btn.remove();
  }
};

window.showRawJson = function(key) {
  const json = window._rawJsonMap && window._rawJsonMap[key];
  if (!json) return;
  const overlay = document.createElement('div');
  overlay.className = 'json-modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="json-modal">
      <div class="json-modal-header">
        <span>Raw JSON</span>
        <button onclick="this.closest('.json-modal-overlay').remove()">&times;</button>
      </div>
      <div class="json-modal-body">${esc(json)}</div>
      <div class="json-modal-actions">
        <button onclick="copyJsonContent(this)">Copy</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Close on Escape key
  const handler = function(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); } };
  document.addEventListener('keydown', handler);
};

window.copyJsonContent = function(btn) {
  const body = btn.closest('.json-modal').querySelector('.json-modal-body');
  if (!body) return;
  navigator.clipboard.writeText(body.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = body.textContent;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
};

// Track whether the user has manually scrolled away from the bottom
let _userScrolledUp = false;
let _scrollListener = null;

function isNearBottom(threshold = 150) {
  return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - threshold);
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function setupScrollTracking() {
  _userScrolledUp = false;
  if (_scrollListener) window.removeEventListener('scroll', _scrollListener);
  _scrollListener = () => {
    // If user scrolled back to bottom, re-enable auto-scroll
    _userScrolledUp = !isNearBottom(200);
  };
  window.addEventListener('scroll', _scrollListener, { passive: true });
}

function cleanupScrollTracking() {
  if (_scrollListener) {
    window.removeEventListener('scroll', _scrollListener);
    _scrollListener = null;
  }
  _userScrolledUp = false;
}

function startActivePolling(projectDir, sessionId) {
  let wasActive = false;
  let isRefreshing = false;
  let lastMtimeMs = 0;

  async function checkStatus() {
    if (isRefreshing) return;
    try {
      const { isActive, mtimeMs } = await api(`/api/status/${encodeURIComponent(projectDir)}/${sessionId}`);
      const banner = document.getElementById('activeBanner');
      if (banner) {
        if (isActive) {
          banner.innerHTML = '<div class="active-banner"><span class="dot"></span> Agent is actively working on this session</div>';
        } else {
          banner.innerHTML = '';
        }
      }

      // Refresh transcript while agent is active, but only if file actually changed
      if (isActive && mtimeMs > lastMtimeMs) {
        const hash = location.hash.slice(1) || '/';
        const parts = hash.split('/').filter(Boolean);
        if (parts[0] === 'session' && parts[1] && parts[2]) {
          isRefreshing = true;
          try {
            const data = await api(`/api/transcript/${encodeURIComponent(projectDir)}/${sessionId}`);
            renderTranscriptData(data, projectDir, sessionId);
            lastMtimeMs = mtimeMs;
            // Auto-scroll to bottom unless user manually scrolled up
            if (!_userScrolledUp) {
              scrollToBottom();
            }
          } finally {
            isRefreshing = false;
          }
        }
      }

      // If it was active and now it's not, do a final reload
      if (wasActive && !isActive) {
        const hash = location.hash.slice(1) || '/';
        const parts = hash.split('/').filter(Boolean);
        if (parts[0] === 'session' && parts[1] && parts[2]) {
          isRefreshing = true;
          try {
            const data = await api(`/api/transcript/${encodeURIComponent(projectDir)}/${sessionId}`);
            renderTranscriptData(data, projectDir, sessionId);
            lastMtimeMs = mtimeMs;
          } finally {
            isRefreshing = false;
          }
        }
        cleanupScrollTracking();
      }
      wasActive = isActive;

      // Stop polling if inactive
      if (!isActive) {
        stopActivePolling();
      }
    } catch {}
  }

  // Set up scroll tracking for auto-scroll behavior
  setupScrollTracking();

  // Check immediately
  checkStatus();
  // Then every 5 seconds
  _activePollingInterval = setInterval(checkStatus, 5000);
}
